<html lang="ko">
<head>

<title>🚗 자동차 색칠놀이</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: #f0f4f8; font-family: 'Jua', cursive; }

.app {
  display: flex;
  flex-direction: row;
  height: 100vh;
  gap: 0;
}

/* ── 왼쪽 사이드바 ── */
.sidebar {
  width: 130px;
  flex-shrink: 0;
  background: #fff;
  box-shadow: 2px 0 12px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  padding: 12px 8px;
  gap: 12px;
  overflow-y: auto;
  z-index: 10;
}
.sidebar-title {
  font-size: 0.78rem;
  color: #bbb;
  text-align: center;
  letter-spacing: 1px;
}

/* 색상 팔레트 */
.colors-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.color-btn {
  aspect-ratio: 1;
  border-radius: 50%;
  border: 3px solid #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  cursor: pointer;
  touch-action: manipulation;
  transition: transform 0.1s;
  position: relative;
}
.color-btn.active {
  border-color: #333;
  box-shadow: 0 0 0 2px #fff, 0 0 0 4px #333;
  transform: scale(1.15);
}
.color-btn:active { transform: scale(0.9); }

/* 지우개 */
.eraser-btn {
  width: 100%;
  padding: 8px 4px;
  background: #f8f8f8;
  border: 2px solid #ddd;
  border-radius: 12px;
  font-family: 'Jua', cursive;
  font-size: 0.78rem;
  color: #888;
  cursor: pointer;
  touch-action: manipulation;
  text-align: center;
}
.eraser-btn.active {
  background: #333;
  color: #fff;
  border-color: #333;
}

/* 굵기 슬라이더 */
.size-section { display: flex; flex-direction: column; gap: 6px; }
.size-preview-wrap {
  display: flex; align-items: center; justify-content: center;
  height: 36px;
  background: #f8f8f8;
  border-radius: 12px;
  border: 2px solid #eee;
}
.size-dot {
  border-radius: 50%;
  background: #333;
  transition: width 0.15s, height 0.15s;
}
input[type=range].size-slider {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: #ddd;
  touch-action: manipulation;
}
input[type=range].size-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: #fff;
  border: 3px solid #aaa;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

/* 지우기 버튼 */
.clear-btn {
  width: 100%;
  padding: 8px 4px;
  background: #fff0f0;
  border: 2px solid #ffcccc;
  border-radius: 12px;
  font-family: 'Jua', cursive;
  font-size: 0.78rem;
  color: #e05555;
  cursor: pointer;
  touch-action: manipulation;
  text-align: center;
}
.clear-btn:active { background: #ffe0e0; }

/* ── 가운데: 차종 선택 + 캔버스 ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* 차종 탭 */
.car-tabs {
  display: flex;
  gap: 0;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  overflow-x: auto;
  flex-shrink: 0;
  padding: 0 8px;
  scrollbar-width: none;
}
.car-tabs::-webkit-scrollbar { display: none; }
.car-tab {
  flex-shrink: 0;
  padding: 10px 14px;
  font-family: 'Jua', cursive;
  font-size: 0.82rem;
  color: #aaa;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  touch-action: manipulation;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
}
.car-tab.active { color: #333; border-bottom-color: #FF6B35; }

/* 캔버스 영역 */
.canvas-wrap {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f0f4f8;
  overflow: hidden;
}
canvas#drawing {
  position: absolute;
  top: 0; left: 0;
  touch-action: none;
  cursor: crosshair;
}
svg#car-svg {
  position: relative;
  z-index: 1;
  pointer-events: none;
  max-width: 100%;
  max-height: 100%;
}
.canvas-bg {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: white;
}
</style>

// ── 상태 ─────────────────────────────────────
var currentColor = '#E03131';
var isEraser = false;
var brushSize = 12;
var drawing = false;
var lastX = 0, lastY = 0;
var currentCarIdx = 0;

// ── DOM ──────────────────────────────────────
var canvas = document.getElementById('drawing');
var ctx = canvas.getContext('2d');
var carSvg = document.getElementById('car-svg');
var canvasWrap = document.getElementById('canvasWrap');

// ── 색상 버튼 생성 ────────────────────────────
var grid = document.getElementById('colorsGrid');
COLORS.forEach(function(c, i) {
  var btn = document.createElement('div');
  btn.className = 'color-btn' + (i===0?' active':'');
  btn.style.backgroundColor = c;
  if(c==='#FFFFFF') btn.style.border = '3px solid #ddd';
  btn.addEventListener('click', function() {
    currentColor = c;
    isEraser = false;
    document.querySelectorAll('.color-btn').forEach(function(b){ b.classList.remove('active'); });
    document.getElementById('eraserBtn').classList.remove('active');
    btn.classList.add('active');
  });
  grid.appendChild(btn);
});

// ── 지우개 ───────────────────────────────────
document.getElementById('eraserBtn').addEventListener('click', function() {
  isEraser = !isEraser;
  this.classList.toggle('active', isEraser);
  document.querySelectorAll('.color-btn').forEach(function(b){ b.classList.remove('active'); });
});

// ── 굵기 ─────────────────────────────────────
var sizeSlider = document.getElementById('sizeSlider');
var sizeDot = document.getElementById('sizeDot');
function updateSize() {
  brushSize = parseInt(sizeSlider.value);
  sizeDot.style.width = brushSize + 'px';
  sizeDot.style.height = brushSize + 'px';
}
sizeSlider.addEventListener('input', updateSize);
updateSize();

// ── 전체 지우기 ───────────────────────────────
document.getElementById('clearBtn').addEventListener('click', function() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
});

// ── 자동차 탭 생성 ────────────────────────────
var tabsEl = document.getElementById('carTabs');
CARS.forEach(function(car, i) {
  var tab = document.createElement('div');
  tab.className = 'car-tab' + (i===0?' active':'');
  tab.textContent = car.brand + ' ' + car.name;
  tab.addEventListener('click', function() {
    document.querySelectorAll('.car-tab').forEach(function(t){ t.classList.remove('active'); });
    tab.classList.add('active');
    currentCarIdx = i;
    loadCar(i);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  });
  tabsEl.appendChild(tab);
});

// ── 자동차 SVG 로드 ───────────────────────────
function loadCar(idx) {
  var car = CARS[idx];
  var pathsHtml = car.paths.map(function(d) {
    return '<path d="' + d + '" fill="none" stroke="#222" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
  }).join('');
  carSvg.innerHTML = pathsHtml;
}

// ── 캔버스 사이즈 조정 ────────────────────────
function resizeCanvas() {
  var rect = canvasWrap.getBoundingClientRect();
  var oldData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  canvas.width = rect.width;
  canvas.height = rect.height;
  ctx.putImageData(oldData, 0, 0);
  // SVG도 캔버스 크기에 맞게
  carSvg.style.width = rect.width + 'px';
  carSvg.style.height = rect.height + 'px';
  document.getElementById('canvasBg').style.width = rect.width + 'px';
  document.getElementById('canvasBg').style.height = rect.height + 'px';
}

// ── 그리기 ───────────────────────────────────
function getPos(e) {
  var rect = canvas.getBoundingClientRect();
  if(e.touches && e.touches.length > 0) {
    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function startDraw(e) {
  e.preventDefault();
  drawing = true;
  var pos = getPos(e);
  lastX = pos.x; lastY = pos.y;
  ctx.beginPath();
  ctx.arc(lastX, lastY, (isEraser ? brushSize*1.5 : brushSize)/2, 0, Math.PI*2);
  ctx.fillStyle = isEraser ? 'rgba(0,0,0,1)' : currentColor;
  if(isEraser) { ctx.globalCompositeOperation = 'destination-out'; ctx.fill(); ctx.globalCompositeOperation = 'source-over'; }
  else ctx.fill();
}

function doDraw(e) {
  e.preventDefault();
  if(!drawing) return;
  var pos = getPos(e);
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(pos.x, pos.y);
  if(isEraser) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.lineWidth = brushSize * 2.5;
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = currentColor;
    ctx.lineWidth = brushSize;
  }
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();
  ctx.globalCompositeOperation = 'source-over';
  lastX = pos.x; lastY = pos.y;
}

function endDraw(e) { drawing = false; }

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', doDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('touchstart', startDraw, {passive:false});
canvas.addEventListener('touchmove', doDraw, {passive:false});
canvas.addEventListener('touchend', endDraw, {passive:false});

// ── 초기화 ───────────────────────────────────
window.addEventListener('resize', resizeCanvas);
setTimeout(function() {
  resizeCanvas();
  loadCar(0);
}, 100);
</script>
